name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"

      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check src tests
          ruff format --check src tests

      - name: Type check
        run: |
          source .venv/bin/activate
          mypy src

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest -v -m "not integration" --cov=triage --cov-report=term-missing
